tunnel: YOUR_TUNNEL_ID
credentials-file: /home/YOUR_USER/.cloudflared/YOUR_TUNNEL_ID.json

# Ingress rules for HomeOS services
ingress:
  # Frontend - Next.js application
  - hostname: homeos.yourdomain.com
    service: http://localhost:3000
    originRequest:
      # Disable TLS verification for local connection
      noTLSVerify: true
      # Connection settings
      connectTimeout: 30s
      tlsTimeout: 10s
      tcpKeepAlive: 30s
      keepAliveConnections: 100
      keepAliveTimeout: 90s
      # HTTP settings
      httpHostHeader: localhost:3000
      originServerName: localhost

  # PocketBase Admin - Optional (recommended to keep internal-only)
  # Uncomment to expose PocketBase admin UI
  # WARNING: Only enable if you understand the security implications
  # - hostname: pocketbase.yourdomain.com
  #   service: http://localhost:8090
  #   originRequest:
  #     noTLSVerify: true
  #     httpHostHeader: localhost:8090
  #     originServerName: localhost

  # Catch-all rule (required)
  - service: http_status:404

# Optional: Metrics endpoint for monitoring
# metrics: 0.0.0.0:9090

# Logging
loglevel: info

# Retry configuration
retries: 3

# Protocol settings
protocol: auto
